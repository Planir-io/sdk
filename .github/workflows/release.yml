# Release + publish, in ONE workflow on purpose.
#
# release-please maintains a release PR per package (ts/, python/). Merging a release PR
# is the ONLY publish trigger. The publish jobs live HERE, gated on release-please's
# per-package outputs, rather than in separate workflows, because:
#   1. OIDC trusted publishing forbids the publish step living in a reusable (workflow_call)
#      workflow — the registry validates the workflow FILENAME, so it must be this one.
#   2. A release-please release created with GITHUB_TOKEN does NOT fire a downstream
#      `on: release` workflow, so a same-workflow gate on the outputs is the zero-secret path.
# => npm + PyPI trusted-publisher records must point at THIS filename (release.yml).
#
# No tokens anywhere: release-please uses GITHUB_TOKEN; publishing is OIDC (id-token: write).
name: release

on:
  push:
    branches: [main]
  workflow_dispatch: # TEMPORARY: manual trigger for the oidc-diagnose job below

permissions:
  contents: write
  pull-requests: write

jobs:
  # TEMPORARY diagnostic: performs npm's OIDC token exchange by hand and prints the
  # registry's verbatim response, so a trusted-publisher mismatch names itself instead
  # of surfacing as a bare ENEEDAUTH. Remove once npm publishing works.
  oidc-diagnose:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Exchange GitHub OIDC token with npm registry
        run: |
          set -euo pipefail
          gh_token_response="$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"
          id_token="$(printf '%s' "$gh_token_response" | jq -r .value)"
          echo "GitHub OIDC token obtained: $([ -n "$id_token" ] && [ "$id_token" != null ] && echo yes || echo NO)"
          echo "--- OIDC claims presented to npm:"
          printf '%s' "$id_token" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{repository, repository_owner, workflow, workflow_ref, job_workflow_ref, environment, ref, event_name}' || true
          echo "--- npm exchange response:"
          status="$(curl -sS -o /tmp/npm-exchange.json -w '%{http_code}' \
            -X POST "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/planir" \
            -H "Authorization: Bearer ${id_token}" \
            -H "Content-Type: application/json")"
          echo "HTTP ${status}"
          if [ "$status" = "200" ] || [ "$status" = "201" ]; then
            echo "EXCHANGE SUCCEEDED (registry token redacted)"
          else
            cat /tmp/npm-exchange.json
            exit 1
          fi

  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      # Gate on the PER-PACKAGE output. The bare `releases_created` output is documented-
      # buggy in v4 (true whenever any release exists in history), so never use it.
      ts_release_created: ${{ steps.release.outputs['ts--release_created'] }}
      python_release_created: ${{ steps.release.outputs['python--release_created'] }}
      ts_tag: ${{ steps.release.outputs['ts--tag_name'] }}
      python_tag: ${{ steps.release.outputs['python--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.ts_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing — no NPM_TOKEN
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      # NO registry-url on purpose: setup-node's registry-url writes a token .npmrc with a
      # placeholder NODE_AUTH_TOKEN, and npm silently falls back to it when the OIDC
      # exchange fails — masking the real error as a 404. With no auth config at all,
      # OIDC trusted publishing is the ONLY auth path and failures surface as ENEEDAUTH.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version
      - run: npm install
      - run: npm run build
      - name: Publish (prerelease versions go to the `beta` dist-tag, never `latest`)
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "$version" == *-* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi

  publish-pypi:
    needs: release-please
    if: ${{ needs.release-please.outputs.python_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC trusted publishing — no PyPI token
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install build
          python -m build
      # PyPI treats PEP 440 prerelease versions correctly on its own — no dist-tag needed.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
