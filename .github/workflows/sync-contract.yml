# Refresh the vendored contract and regenerate the SDKs — the ONLY way fern/openapi.json
# changes. Pulls the PUBLIC published contract (no auth, no secret), regenerates, and opens
# a single self-consistent PR (spec diff + generated diff together) for human review. If
# nothing changed, no PR is opened. This is the deliberate, reviewable alternative to
# curl-at-build: a contract bump is always an explicit diff, never a silent SDK change.
#
# Trigger model: the PRIMARY trigger is a human dispatching this workflow right after a
# contract change deploys (a line in the provider's deploy checklist); the daily cron is
# the backstop for the day someone forgets. No cross-repo push credential — that trade
# was made deliberately (zero secrets) and polling-as-backstop is the standard posture.
#
# oasdiff classifies the contract diff. The contract is SOFT-FROZEN (additive only until
# beta), so a breaking diff fails this run AFTER the PR is opened: the PR carries the full
# diff + verdict for review, but the red run stops a breaking change from reading as a
# friendly routine sync.
#
# Note: the PR is created with SYNC_BOT_TOKEN (planir-bot fine-grained PAT, this repo only,
# Contents + Pull requests write) so ci.yml's `on: pull_request` gate runs on sync PRs
# automatically — the original GITHUB_TOKEN posture left auto-PRs check-less and stuck
# behind the workflow-approval banner (hit live 2026-07-09 on the control-plane sync, PR #5).
# The zero-secrets trade documented here previously was consciously revised that day.
# If the secret is ever missing, the step falls back to GITHUB_TOKEN: the sync still works,
# the PR just reverts to needing manual workflow approval + post-merge CI.
name: sync-contract

on:
  schedule:
    - cron: "0 6 * * *" # daily backstop; the real trigger is dispatch-on-deploy
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch the published contract (public, no auth)
        run: |
          cp fern/openapi.json /tmp/openapi.previous.json
          curl -fsSL https://api.planir.io/openapi.json -o fern/openapi.json.new
          # Guard against a truncated/garbage response before it lands in the tree.
          jq empty fern/openapi.json.new
          mv fern/openapi.json.new fern/openapi.json

      - name: Classify the contract diff (oasdiff)
        id: oasdiff
        run: |
          if cmp -s /tmp/openapi.previous.json fern/openapi.json; then
            echo "verdict=unchanged" >> "$GITHUB_OUTPUT"
            echo "Contract unchanged."
            exit 0
          fi
          # Pinned binary (the docker image only ships mutable tags — no pins there).
          curl -fsSL https://github.com/oasdiff/oasdiff/releases/download/v1.21.0/oasdiff_1.21.0_linux_amd64.tar.gz -o /tmp/oasdiff.tgz
          echo "293811c172672e9e86313ef925f136d8a2352c7b56937f6b0f91c5de1166bd8f  /tmp/oasdiff.tgz" | sha256sum -c -
          tar xzf /tmp/oasdiff.tgz -C /tmp oasdiff
          set +e
          /tmp/oasdiff breaking --fail-on WARN /tmp/openapi.previous.json fern/openapi.json \
            > /tmp/oasdiff.txt 2>&1
          breaking=$?
          set -e
          cat /tmp/oasdiff.txt
          if [ "$breaking" -ne 0 ]; then
            echo "verdict=BREAKING" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=additive" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate SDK source from the refreshed contract
        run: ./scripts/regen.sh

      - name: Compose PR body (always — create-pull-request reads body-path even when it
          ends up opening nothing)
        run: |
          touch /tmp/oasdiff.txt
          {
            echo "Automated by \`sync-contract.yml\`."
            echo
            echo "**oasdiff verdict: ${{ steps.oasdiff.outputs.verdict }}**"
            echo
            echo '```'
            cat /tmp/oasdiff.txt
            echo '```'
            echo
            echo "Pulled the latest published contract from"
            echo '`https://api.planir.io/openapi.json` and regenerated the SDK source.'
            echo "Review the contract diff and the generated \`ts/src\` + \`python/src/planir\`"
            echo "diff together — they must land as one commit to keep the drift gate green."
          } > /tmp/pr-body.md

      - name: Open PR if the contract or generated code changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SYNC_BOT_TOKEN || github.token }}
          branch: sync/contract
          title: "chore: sync published contract + regenerate SDKs (${{ steps.oasdiff.outputs.verdict }})"
          commit-message: "chore: sync published contract + regenerate SDKs"
          author: "planir-bot <300069359+planir-bot@users.noreply.github.com>"
          committer: "planir-bot <300069359+planir-bot@users.noreply.github.com>"
          body-path: /tmp/pr-body.md
          add-paths: |
            fern/openapi.json
            ts/src
            python/src/planir

      - name: Enforce additive-only (contract soft freeze)
        if: ${{ steps.oasdiff.outputs.verdict == 'BREAKING' }}
        run: |
          echo "::error::Breaking contract change detected. The PR is open with the full oasdiff report — this red run exists so a breaking sync can never read as routine."
          exit 1
